<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Trigonometry Runner 3D</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  #info {
    position:absolute; top:10px; left:10px; color:white; font-family:Arial;
    font-size:16px; background:rgba(0,0,0,0.5); padding:10px; border-radius:8px;
  }
</style>
</head>
<body>
<div id="info">استخدم الأسهم للتحرك! اجمع النجوم وتجنب العقبات!</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>

// ========================
// إعداد المشهد والكاميرا
// ========================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,5,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ========================
// الإضاءة
// ========================
const ambientLight = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff,0.8);
directionalLight.position.set(0,10,10);
scene.add(directionalLight);

// ========================
// الطريق (منحنى sin/cos/tan)
// ========================
const roadPoints = [];
const roadSegments = 200;
const roadLength = 500;
const roadGeometry = new THREE.BufferGeometry();

for(let i=0;i<roadSegments;i++){
    const x = (i/roadSegments)*roadLength - roadLength/2;
    const y = 5*Math.sin(i*0.2); // يمكنك تغيير sin → cos أو tan
    const z = 0;
    roadPoints.push(new THREE.Vector3(x,y,z));
}

roadGeometry.setFromPoints(roadPoints);
const roadMaterial = new THREE.LineBasicMaterial({color:0x00ffcc, linewidth:3});
const road = new THREE.Line(roadGeometry, roadMaterial);
scene.add(road);

// ========================
// اللاعب (كرة فضائية)
// ========================
const ballGeometry = new THREE.SphereGeometry(1,32,32);
const ballMaterial = new THREE.MeshStandardMaterial({color:0xff4444, metalness:0.6, roughness:0.4});
const ball = new THREE.Mesh(ballGeometry, ballMaterial);
scene.add(ball);
ball.position.set(roadPoints[0].x,roadPoints[0].y+1,roadPoints[0].z);

// ========================
// الأهداف (نجوم)
// ========================
const stars = [];
for(let i=10;i<roadSegments;i+=15){
  const starGeom = new THREE.SphereGeometry(0.5,16,16);
  const starMat = new THREE.MeshStandardMaterial({color:0xffff00, emissive:0xffff00});
  const star = new THREE.Mesh(starGeom, starMat);
  star.position.set(roadPoints[i].x, roadPoints[i].y+2, roadPoints[i].z);
  scene.add(star);
  stars.push(star);
}

// ========================
// العقبات (مكعبات)
// ========================
const obstacles = [];
for(let i=5;i<roadSegments;i+=20){
  const obsGeom = new THREE.BoxGeometry(1.5,1.5,1.5);
  const obsMat = new THREE.MeshStandardMaterial({color:0xff0000});
  const obs = new THREE.Mesh(obsGeom, obsMat);
  obs.position.set(roadPoints[i].x, roadPoints[i].y+1, roadPoints[i].z + Math.sin(i*0.5)*2);
  scene.add(obs);
  obstacles.push(obs);
}

// ========================
// التحكم
// ========================
let ballIndex = 0;
const speed = 0.5;
let moveLeft = false;
let moveRight = false;

document.addEventListener('keydown', (e)=>{
    if(e.key==='ArrowLeft') moveLeft=true;
    if(e.key==='ArrowRight') moveRight=true;
});
document.addEventListener('keyup', (e)=>{
    if(e.key==='ArrowLeft') moveLeft=false;
    if(e.key==='ArrowRight') moveRight=false;
});

// ========================
// اللعبة
// ========================
function animate(){
    requestAnimationFrame(animate);

    // تحريك الكرة على الطريق
    ballIndex += speed;
    if(ballIndex>=roadPoints.length-1) ballIndex = 0;

    const pos = roadPoints[Math.floor(ballIndex)];
    ball.position.y = pos.y + 1;
    ball.position.x = pos.x;
    ball.position.z = pos.z;

    // التحرك يمين ويسار
    if(moveLeft) ball.position.z -=0.2;
    if(moveRight) ball.position.z +=0.2;

    // تحريك الكاميرا لمتابعة الكرة
    camera.position.x = ball.position.x + 5;
    camera.position.y = ball.position.y + 5;
    camera.position.z = ball.position.z + 10;
    camera.lookAt(ball.position);

    // تحريك العقبات ديناميكياً باستخدام sin/cos
    obstacles.forEach((obs,i)=>{
        obs.position.z = Math.sin(Date.now()*0.002 + i)*2;
    });

    // تحريك النجوم بلطف للأعلى والأسفل
    stars.forEach(star=>{
        star.position.y += Math.sin(Date.now()*0.003)*0.02;
    });

    renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
