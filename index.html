<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏹 Hero of the Unit Circle</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#0f2027,#203a43,#2c5364);
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:15px;
    text-shadow:0 0 20px cyan;
}

#gameCanvas{
    background:rgba(0,0,0,0.4);
    border:3px solid cyan;
    border-radius:50%;
    box-shadow:0 0 30px cyan;
}

#ui{
    margin-top:15px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    background:cyan;
    font-weight:bold;
}

button:hover{
    background:magenta;
    color:white;
}

#score{
    font-size:20px;
    margin-top:10px;
}

#timer{
    font-size:18px;
    color:yellow;
}

.option-btn{
    width:120px;
}
</style>
</head>
<body>

<h1>🏹 Hero of the Unit Circle</h1>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div id="ui">
    <div id="question"></div>
    <div id="options"></div>
    <div id="timer"></div>
    <div id="score">النقاط: 0</div>
</div>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let centerX=200;
let centerY=200;
let radius=150;

let score=0;
let lives=3;
let currentAngle=0;
let currentAnswer="";
let mode="sin";
let timeLeft=10;
let timerInterval;

const angles=[0,30,45,60,90,120,135,150,180,210,225,240,270,300,315,330];

function drawCircle(){
    ctx.clearRect(0,0,400,400);

    ctx.beginPath();
    ctx.arc(centerX,centerY,radius,0,Math.PI*2);
    ctx.strokeStyle="cyan";
    ctx.lineWidth=3;
    ctx.stroke();

    ctx.beginPath();
    let rad=currentAngle*Math.PI/180;
    let x=centerX+radius*Math.cos(rad);
    let y=centerY-radius*Math.sin(rad);

    ctx.moveTo(centerX,centerY);
    ctx.lineTo(x,y);
    ctx.strokeStyle="yellow";
    ctx.lineWidth=4;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x,y,6,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
}

function newRound(){
    currentAngle=angles[Math.floor(Math.random()*angles.length)];
    mode=Math.random()>0.5?"sin":"cos";

    let rad=currentAngle*Math.PI/180;
    let value=mode==="sin"?Math.sin(rad):Math.cos(rad);

    currentAnswer=parseFloat(value.toFixed(2));

    document.getElementById("question").innerHTML=
    `ما قيمة ${mode}(${currentAngle}°) ؟`;

    generateOptions();
    startTimer();
    drawCircle();
}

function generateOptions(){
    let options=[currentAnswer];
    while(options.length<4){
        let fake=(Math.random()*2-1).toFixed(2);
        if(!options.includes(parseFloat(fake)))
            options.push(parseFloat(fake));
    }

    options.sort(()=>Math.random()-0.5);

    let container=document.getElementById("options");
    container.innerHTML="";

    options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.className="option-btn";
        btn.innerText=opt;
        btn.onclick=()=>checkAnswer(opt);
        container.appendChild(btn);
    });
}

function checkAnswer(answer){
    if(answer===currentAnswer){
        score++;
        explode();
    }else{
        lives--;
    }

    document.getElementById("score").innerText=
    `النقاط: ${score} | المحاولات: ${lives}`;

    if(lives<=0){
        alert("انتهت اللعبة 😢");
        location.reload();
    }else{
        clearInterval(timerInterval);
        newRound();
    }
}

function startTimer(){
    timeLeft=10;
    document.getElementById("timer").innerText=
    `الوقت: ${timeLeft}`;

    timerInterval=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText=
        `الوقت: ${timeLeft}`;

        if(timeLeft<=0){
            lives--;
            clearInterval(timerInterval);
            document.getElementById("score").innerText=
            `النقاط: ${score} | المحاولات: ${lives}`;
            if(lives<=0){
                alert("انتهت اللعبة 😢");
                location.reload();
            }else{
                newRound();
            }
        }
    },1000);
}

function explode(){
    for(let i=0;i<30;i++){
        let particle=document.createElement("div");
        particle.style.position="fixed";
        particle.style.left=Math.random()*100+"vw";
        particle.style.top=Math.random()*100+"vh";
        particle.style.width="6px";
        particle.style.height="6px";
        particle.style.background="hsl("+Math.random()*360+",100%,50%)";
        particle.style.borderRadius="50%";
        particle.style.animation="fade 1s linear forwards";
        document.body.appendChild(particle);
        setTimeout(()=>particle.remove(),1000);
    }
}

newRound();
</script>

<style>
@keyframes fade{
    to{
        transform:translateY(50px);
        opacity:0;
    }
}
</style>

</body>
</html>
