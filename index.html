<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Heroes</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(180deg,#6dd5fa,#2980b9);
text-align:center;
color:white;
}

/* النجوم */
.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation: twinkle 2s infinite alternate;
}
@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* المركبة */
#ship{
position:absolute;
width:80px;
transition:1s;
}

/* الصندوق */
#ui{
position:absolute;
top:20px;
width:100%;
}

button{
padding:12px 20px;
margin:5px;
font-size:18px;
border:none;
border-radius:20px;
background:#ffcc00;
cursor:pointer;
transition:0.3s;
}
button:hover{
transform:scale(1.1);
background:#ff9900;
}

/* انفجار */
.explosion{
position:absolute;
font-size:40px;
animation: boom 0.8s forwards;
}
@keyframes boom{
0%{transform:scale(0);opacity:1}
100%{transform:scale(2);opacity:0}
}

/* طقس */
.rain{
position:absolute;
width:2px;
height:15px;
background:white;
animation: rainFall 0.7s linear infinite;
}
@keyframes rainFall{
to{transform:translateY(800px)}
}
</style>
</head>

<body>

<div id="ui">
<h1>🚀 Planet Heroes 🌍</h1>
<div id="info">النقاط: 0 | المستوى: 1 | الطاقة: 3</div>
<div id="question"></div>
</div>

<img id="ship" src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">

<audio id="bgMusic" loop autoplay>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1c9cce0d3e.mp3?filename=kids-game-112191.mp3">
</audio>

<script>
let score=0;
let level=1;
let energy=3;

const ship=document.getElementById("ship");
ship.style.left="50%";
ship.style.top="70%";

/* نجوم */
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(s);
}

/* توليد سؤال */
function newQuestion(){
let types=["sin","cos","latitude"];
let type=types[Math.floor(Math.random()*types.length)];

if(type==="latitude"){
latitudeQuestion();
}else{
trigQuestion(type);
}
}

/* سؤال مثلثات */
function trigQuestion(type){
let angle=[0,30,45,60,90][Math.floor(Math.random()*5)];
let correct=(type==="sin"?Math.sin(angle*Math.PI/180):Math.cos(angle*Math.PI/180)).toFixed(2);

let options=[correct];
while(options.length<4){
let fake=(Math.random()).toFixed(2);
if(!options.includes(fake)) options.push(fake);
}
options.sort(()=>Math.random()-0.5);

document.getElementById("question").innerHTML=
`ما قيمة ${type}(${angle}°) ؟<br>`+
options.map(o=>`<button onclick="check('${o}','${correct}')">${o}</button>`).join("");
}

/* سؤال خطوط العرض */
function latitudeQuestion(){
let data=[
{name:"خط الاستواء",value:"0°"},
{name:"مدار السرطان",value:"23.5° شمالاً"},
{name:"الدائرة القطبية",value:"66.5° شمالاً"}
];
let q=data[Math.floor(Math.random()*data.length)];

let options=data.map(d=>d.value);
options.sort(()=>Math.random()-0.5);

document.getElementById("question").innerHTML=
`أين يقع ${q.name} ؟<br>`+
options.map(o=>`<button onclick="check('${o}','${q.value}')">${o}</button>`).join("");
}

/* تحقق */
function check(sel,correct){
if(sel===correct){
score++;
level=Math.floor(score/5)+1;
explode();
moveShip();
weatherEffect();
}else{
energy--;
}

updateUI();

if(energy<=0){
alert("انتهت الطاقة! 😢");
location.reload();
}
if(score>=20){
alert("فزت باللعبة! 🎉🌍");
location.reload();
}

setTimeout(newQuestion,800);
}

/* تحديث */
function updateUI(){
document.getElementById("info").innerText=
`النقاط: ${score} | المستوى: ${level} | الطاقة: ${energy}`;
}

/* انفجار */
function explode(){
let e=document.createElement("div");
e.className="explosion";
e.innerText="💥";
e.style.left=ship.style.left;
e.style.top=ship.style.top;
document.body.appendChild(e);
setTimeout(()=>e.remove(),800);
}

/* تحريك المركبة */
function moveShip(){
ship.style.left=Math.random()*80+"%";
ship.style.top=50+Math.random()*30+"%";
}

/* طقس */
function weatherEffect(){
for(let i=0;i<30;i++){
let r=document.createElement("div");
r.className="rain";
r.style.left=Math.random()*window.innerWidth+"px";
r.style.top="-20px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),800);
}
}

newQuestion();
</script>

</body>
</html>
