<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>االدوال </title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #001f3f, #000814);
    font-family: 'Segoe UI', sans-serif;
    color:white;
    text-align:center;
}

h1{
    position:absolute;
    top:10px;
    width:100%;
    font-size:28px;
    text-shadow:0 0 15px cyan;
}

#score{
    position:absolute;
    top:60px;
    width:100%;
    font-size:20px;
}

canvas{
    display:block;
    margin:auto;
}

#questionBox{
    position:absolute;
    bottom:80px;
    width:100%;
    font-size:22px;
}

button{
    margin:5px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(45deg, #00f5ff, #0077ff);
    color:white;
    box-shadow:0 0 10px cyan;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

#message{
    position:absolute;
    bottom:20px;
    width:100%;
    font-size:22px;
    color:yellow;
}
</style>
</head>

<body>

<h1>الدوال🚀</h1>
<div id="score">النقاط: 0 | الدرع: 3</div>
<canvas id="gameCanvas"></canvas>

<div id="questionBox"></div>
<div id="message"></div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let shield = 3;
let earthAngle = 0;

function drawEarth(){
    let x = canvas.width/2;
    let y = canvas.height/2;
    let radius = 180;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(earthAngle);

    ctx.beginPath();
    ctx.arc(0,0,radius,0,Math.PI*2);
    ctx.fillStyle="#0077be";
    ctx.fill();

    ctx.strokeStyle="white";
    for(let lat=-60; lat<=60; lat+=30){
        ctx.beginPath();
        ctx.ellipse(0,0,radius,radius*Math.cos(lat*Math.PI/180),0,0,Math.PI*2);
        ctx.stroke();
    }

    ctx.restore();
    earthAngle += 0.002;
}

function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawEarth();
    requestAnimationFrame(gameLoop);
}
gameLoop();

function randomTrigQuestion(){
    let angle = [0,30,45,60,90][Math.floor(Math.random()*5)];
    let type = ["sin","cos"][Math.floor(Math.random()*2)];
    let correct;

    if(type==="sin"){
        correct = Math.sin(angle*Math.PI/180).toFixed(2);
    }else{
        correct = Math.cos(angle*Math.PI/180).toFixed(2);
    }

    let options = [correct];
    while(options.length<4){
        let fake = (Math.random()).toFixed(2);
        if(!options.includes(fake)) options.push(fake);
    }

    options.sort(()=>Math.random()-0.5);

    document.getElementById("questionBox").innerHTML =
        `<div>احسب ${type}(${angle}°)</div>` +
        options.map(o=>`<button onclick="checkAnswer('${o}','${correct}')">${o}</button>`).join("");
}

function randomLatitudeQuestion(){
    let latitudes = [
        {name:"خط الاستواء", value:"0°"},
        {name:"مدار السرطان", value:"23.5° شمالاً"},
        {name:"مدار الجدي", value:"23.5° جنوباً"},
        {name:"الدائرة القطبية الشمالية", value:"66.5° شمالاً"}
    ];

    let q = latitudes[Math.floor(Math.random()*latitudes.length)];

    let options = latitudes.map(l=>l.value);
    options.sort(()=>Math.random()-0.5);

    document.getElementById("questionBox").innerHTML =
        `<div>ما دائرة العرض الخاصة بـ ${q.name} ؟</div>` +
        options.map(o=>`<button onclick="checkAnswer('${o}','${q.value}')">${o}</button>`).join("");
}

function checkAnswer(selected, correct){
    if(selected===correct){
        score++;
        document.getElementById("message").innerText="✅ إجابة صحيحة!";
    }else{
        shield--;
        document.getElementById("message").innerText="❌ إجابة خاطئة!";
    }

    document.getElementById("score").innerText=
        `النقاط: ${score} | الدرع: ${shield}`;

    if(shield<=0){
        alert("💥 انتهت اللعبة! حاول مرة أخرى.");
        location.reload();
    }

    if(score>=10){
        alert("🎉 لقد أنقذت الأرض! فوز رائع!");
        location.reload();
    }

    setTimeout(nextQuestion,1000);
}

function nextQuestion(){
    document.getElementById("message").innerText="";
    if(Math.random()>0.5){
        randomTrigQuestion();
    }else{
        randomLatitudeQuestion();
    }
}

nextQuestion();
</script>

</body>
</html>
