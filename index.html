<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مغامرة الكرة على الأرض الكروية</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(to bottom, #87ceeb, #f0f8ff);
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  canvas {
    display: block;
    margin: 0 auto;
    background: #a3d9a5;
    border-radius: 50%;
    box-shadow: 0 0 50px rgba(0,0,0,0.3);
  }
  #info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.8);
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
  }
  button {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    cursor: pointer;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
  }
  button:hover {
    background: #ffdd33;
  }
</style>
</head>
<body>

<div id="info">اضغط الأسهم لتحريك الكرة والوصول للأهداف!</div>
<canvas id="gameCanvas" width="600" height="600"></canvas>
<button id="resetBtn">إعادة اللعبة</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const width = canvas.width;
const height = canvas.height;

let angle = 0;           // الزاوية للكرة
let speed = 0.05;        // سرعة الحركة
let ballRadius = 15;
let ballX = width/2;
let ballY = height/2;
let score = 0;

// أهداف على خطوط عرض مختلفة
const targets = [
  {x: width/2 + 100, y: height/2 - 100, radius: 10, hit: false},
  {x: width/2 - 120, y: height/2 + 80, radius: 10, hit: false},
  {x: width/2 + 50, y: height/2 + 150, radius: 10, hit: false},
];

// 🎯 رسم خطوط العرض
function drawLatitudeLines() {
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  for(let i=-2; i<=2; i++){
    ctx.beginPath();
    ctx.arc(width/2, height/2, 100 + i*40, 0, Math.PI*2);
    ctx.stroke();
  }
}

// 🎯 رسم الكرة
function drawBall() {
  ctx.beginPath();
  ctx.arc(ballX, ballY, ballRadius, 0, Math.PI*2);
  ctx.fillStyle = '#ff4444';
  ctx.fill();
  ctx.strokeStyle = '#aa0000';
  ctx.stroke();
}

// 🎯 رسم الأهداف
function drawTargets() {
  targets.forEach(target => {
    if(!target.hit){
      ctx.beginPath();
      ctx.arc(target.x, target.y, target.radius, 0, Math.PI*2);
      ctx.fillStyle = '#ffdd00';
      ctx.fill();
      ctx.strokeStyle = '#aa8800';
      ctx.stroke();
    }
  });
}

// 🎯 تحديث الكرة وملاحظة الاصطدام
function updateBall() {
  // حركة بسيطة باستخدام sin/cos
  ballX = width/2 + 150 * Math.cos(angle);
  ballY = height/2 + 100 * Math.sin(angle);

  // تحقق من الاصطدام مع الأهداف
  targets.forEach(target => {
    const dx = ballX - target.x;
    const dy = ballY - target.y;
    if(!target.hit && Math.sqrt(dx*dx + dy*dy) < ballRadius + target.radius){
      target.hit = true;
      score++;
      alert('وصلت لهدف! 🎯 مجموع النقاط: ' + score);
    }
  });
}

// 🎯 الرسم الرئيسي
function draw() {
  ctx.clearRect(0,0,width,height);
  drawLatitudeLines();
  drawTargets();
  drawBall();
}

// 🎯 التحكم باللعبة
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') angle += speed;
  if(e.key === 'ArrowLeft') angle -= speed;
});

// إعادة اللعبة
document.getElementById('resetBtn').addEventListener('click', ()=>{
  angle = 0;
  ballX = width/2;
  ballY = height/2;
  targets.forEach(t=> t.hit=false);
  score = 0;
});

// 🎯 حلقة اللعبة
function gameLoop() {
  updateBall();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
