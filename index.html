<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلة الكرة السحرية</title>
<style>
  body {
    margin: 0;
    background: #87ceeb; /* سماء زرقاء */
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  canvas {
    display: block;
    margin: 0 auto;
    background: linear-gradient(to bottom, #87ceeb, #f0f8ff);
  }
  #info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.8);
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
  }
  button {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    cursor: pointer;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
  }
  button:hover {
    background: #ffdd33;
  }
</style>
</head>
<body>
<div id="info">استخدم أسهم لوحة المفاتيح لتحريك الكرة! 🌟</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<button id="resetBtn">إعادة اللعبة</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const width = canvas.width;
const height = canvas.height;

// ⚡ الكرة السحرية
let ball = {
  x: width/2,
  y: height/2,
  radius: 25,
  angle: 0,
  speed: 0.05,
  color: '#ff4444'
};

// ⭐ أهداف النجوم
let stars = [
  {x: 200, y: 100, radius: 15, collected: false},
  {x: 600, y: 150, radius: 15, collected: false},
  {x: 400, y: 500, radius: 15, collected: false},
  {x: 150, y: 400, radius: 15, collected: false},
];

// 🌥️ الغيوم المتحركة
let clouds = [
  {x: 100, y: 80, speed: 0.3},
  {x: 400, y: 50, speed: 0.2},
  {x: 700, y: 120, speed: 0.4},
];

// 🔹 رسم الخلفية (سماء + غيوم)
function drawBackground() {
  ctx.fillStyle = '#87ceeb';
  ctx.fillRect(0, 0, width, height);
  clouds.forEach(cloud => {
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(cloud.x, cloud.y, 60, 40, 0, 0, Math.PI*2);
    ctx.fill();
    cloud.x += cloud.speed;
    if(cloud.x > width + 100) cloud.x = -100;
  });
}

// 🔹 رسم الكرة السحرية مع وجه مبتسم وذيل متلألئ
function drawBall() {
  // ذيل متلألئ
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.arc(ball.x - i*8, ball.y, 10-i*2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,0,'+(0.5-i*0.1)+')';
    ctx.fill();
  }
  // الكرة
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
  ctx.fillStyle = ball.color;
  ctx.fill();
  ctx.strokeStyle = '#aa0000';
  ctx.stroke();
  // عيون مبتسمة
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(ball.x - 10, ball.y - 5, 5, 0, Math.PI*2);
  ctx.arc(ball.x + 10, ball.y - 5, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'black';
  ctx.beginPath();
  ctx.arc(ball.x - 10, ball.y - 5, 2, 0, Math.PI*2);
  ctx.arc(ball.x + 10, ball.y - 5, 2, 0, Math.PI*2);
  ctx.fill();
  // ابتسامة
  ctx.beginPath();
  ctx.arc(ball.x, ball.y + 5, 10, 0, Math.PI);
  ctx.strokeStyle = 'black';
  ctx.stroke();
}

// 🔹 رسم النجوم
function drawStars() {
  stars.forEach(star => {
    if(!star.collected){
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2);
      ctx.fillStyle = 'yellow';
      ctx.fill();
      ctx.strokeStyle = 'orange';
      ctx.stroke();
    }
  });
}

// 🔹 تحديث الكرة والتحقق من جمع النجوم
function updateBall() {
  // حركة على منحنى sin/cos (الكرة تتحرك أفقيًا حسب الزاوية)
  ball.x = width/2 + 200 * Math.cos(ball.angle);
  ball.y = height/2 + 150 * Math.sin(ball.angle);

  // التحقق من جمع النجوم
  stars.forEach(star => {
    const dx = ball.x - star.x;
    const dy = ball.y - star.y;
    if(!star.collected && Math.sqrt(dx*dx + dy*dy) < ball.radius + star.radius){
      star.collected = true;
      // تأثير انفجار نجمي صغير
      for(let i=0;i<10;i++){
        setTimeout(()=>{
          ctx.beginPath();
          ctx.arc(star.x + Math.random()*20-10, star.y + Math.random()*20-10, 5, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255,255,0,0.8)';
          ctx.fill();
        }, i*50);
      }
    }
  });
}

// 🔹 التحكم باللعبة
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') ball.angle += ball.speed;
  if(e.key === 'ArrowLeft') ball.angle -= ball.speed;
});

// إعادة اللعبة
document.getElementById('resetBtn').addEventListener('click', ()=>{
  ball.angle = 0;
  ball.x = width/2;
  ball.y = height/2;
  stars.forEach(s=> s.collected=false);
});

// 🔹 الرسم الرئيسي
function draw() {
  ctx.clearRect(0,0,width,height);
  drawBackground();
  drawStars();
  drawBall();
}

// 🔹 حلقة اللعبة
function gameLoop() {
  updateBall();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
