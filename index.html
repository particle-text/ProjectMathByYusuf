<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 عجلة أبطال المثلثات</title>

<style>

body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background: radial-gradient(circle,#0f2027,#203a43,#2c5364);
    color:white;
    overflow:hidden;
}

h1{
    margin-top:20px;
    text-shadow:0 0 20px cyan;
}

/* صندوق النقاط الاحترافي */
.score-box{
    position:absolute;
    top:20px;
    right:20px;
    background:linear-gradient(45deg,cyan,magenta);
    padding:15px 25px;
    border-radius:20px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 0 20px cyan;
}

.wheel-container{
    position:relative;
    width:380px;
    height:380px;
    margin:60px auto;
}

.wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:8px solid white;
    position:relative;
    transition:transform 0.1s linear;
}

.pointer{
    position:absolute;
    top:-25px;
    left:50%;
    transform:translateX(-50%);
    font-size:40px;
}

#question-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:rgba(0,0,0,0.95);
    padding:30px;
    border-radius:20px;
    width:320px;
    transition:0.4s;
    box-shadow:0 0 40px cyan;
}

#question-box.show{
    transform:translate(-50%,-50%) scale(1);
}

.answer-btn{
    display:block;
    margin:10px auto;
    width:200px;
    padding:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    background:cyan;
    cursor:pointer;
    margin:10px;
    font-weight:bold;
}

button:hover{
    background:magenta;
    color:white;
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:0;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}

</style>
</head>
<body>

<h1>🎡 عجلة أبطال sin cos tan 🎡</h1>

<div class="score-box">
🏆 النقاط: <span id="score">0</span>
</div>

<div class="wheel-container">
    <div class="pointer">▼</div>
    <div class="wheel" id="wheel"></div>
</div>

<button onclick="spinWheel()" id="spinBtn">لف العجلة</button>

<div id="question-box">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <div id="result"></div>
</div>

<script>

let score=0;
let rotation=0;
let speed=0;
let spinning=false;
let selectedIndex=0;

let questions=[
{q:"sin(30°)",a:"0.5"},
{q:"cos(60°)",a:"0.5"},
{q:"tan(45°)",a:"1"},
{q:"sin(90°)",a:"1"},
{q:"cos(0°)",a:"1"},
{q:"tan(0°)",a:"0"},
{q:"sin(45°)",a:"0.71"},
{q:"cos(45°)",a:"0.71"},
{q:"tan(30°)",a:"0.58"},
{q:"tan(60°)",a:"1.73"}
];

const wheel=document.getElementById("wheel");

function drawWheel(){

wheel.innerHTML="";

let total=questions.length;
let angle=360/total;

let gradient="conic-gradient(";
for(let i=0;i<total;i++){
let color=`hsl(${i*360/total},70%,60%)`;
gradient+=`${color} ${i*angle}deg ${(i+1)*angle}deg`;
if(i<total-1) gradient+=",";
}
gradient+=")";
wheel.style.background=gradient;

for(let i=0;i<total;i++){

let label=document.createElement("div");
label.innerText=questions[i].q;
label.style.position="absolute";
label.style.left="50%";
label.style.top="50%";
label.style.transformOrigin="0 0";
label.style.fontSize="14px";
label.style.fontWeight="bold";
label.style.color="black";

/* كتابة طولية */
label.style.transform=
`rotate(${i*angle+angle/2}deg)
 translate(150px)
 rotate(180deg)`;

wheel.appendChild(label);
}

}

drawWheel();

function spinWheel(){

if(spinning || questions.length===0) return;

spinning=true;
document.getElementById("spinBtn").disabled=true;

selectedIndex=Math.floor(Math.random()*questions.length);
speed=30;

animate();
}

function animate(){

rotation+=speed;
wheel.style.transform=`rotate(${rotation}deg)`;

speed*=0.97;

if(speed>0.3){
requestAnimationFrame(animate);
}else{

spinning=false;

let total=questions.length;
let angle=360/total;
let finalAngle=(360 - (selectedIndex*angle) - angle/2);
rotation=Math.floor(rotation/360)*360 + finalAngle;
wheel.style.transform=`rotate(${rotation}deg)`;

setTimeout(()=>{
showQuestion(selectedIndex);
},800);
}
}

function showQuestion(index){

document.getElementById("question-box").classList.add("show");

let question=questions[index];
document.getElementById("question").innerText="احسب "+question.q;

let options=[question.a];

while(options.length<4){
let fake=(Math.random()*2).toFixed(2);
if(!options.includes(fake)) options.push(fake);
}

options.sort(()=>Math.random()-0.5);

let answers=document.getElementById("answers");
answers.innerHTML="";

options.forEach(option=>{
let btn=document.createElement("button");
btn.className="answer-btn";
btn.innerText=option;
btn.onclick=()=>checkAnswer(option,index);
answers.appendChild(btn);
});
}

function checkAnswer(option,index){

if(option===questions[index].a){
score++;
explode();
document.getElementById("result").innerText="🔥 إجابة صحيحة!";
}else{
document.getElementById("result").innerText="❌ إجابة خاطئة!";
}

document.getElementById("score").innerText=score;

setTimeout(()=>{
questions.splice(index,1);
document.getElementById("question-box").classList.remove("show");
document.getElementById("result").innerText="";
document.getElementById("spinBtn").disabled=false;

drawWheel();

},2000);
}

function explode(){
for(let i=0;i<50;i++){
let conf=document.createElement("div");
conf.className="confetti";
conf.style.left=Math.random()*100+"vw";
conf.style.background="hsl("+Math.random()*360+",100%,50%)";
document.body.appendChild(conf);
setTimeout(()=>conf.remove(),3000);
}
}

</script>

</body>
</html>
