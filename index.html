<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Heroes Ultimate</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(180deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
color:white;
}

/* شاشة البداية */
#startScreen{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(45deg,#ff9a9e,#fad0c4);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

#startScreen button{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:20px;
background:#ffcc00;
cursor:pointer;
}

/* الكوكب */
#planet{
width:200px;
height:200px;
background:radial-gradient(circle,#2ecc71,#27ae60);
border-radius:50%;
position:relative;
animation:rotate 20s linear infinite;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

@keyframes rotate{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* المركبة */
#ship{
position:absolute;
width:70px;
transition:0.8s;
}

/* الأسئلة */
#gameUI{
margin-top:20px;
text-align:center;
}

button.option{
padding:10px 20px;
margin:5px;
font-size:18px;
border:none;
border-radius:20px;
background:#ffcc00;
cursor:pointer;
transition:0.3s;
}
button.option:hover{
transform:scale(1.1);
background:#ff9900;
}

#info{
margin-top:10px;
font-size:20px;
}

/* انفجار */
.explosion{
position:absolute;
font-size:40px;
animation:boom 0.8s forwards;
}

@keyframes boom{
0%{transform:scale(0);opacity:1}
100%{transform:scale(2);opacity:0}
}

/* عداد الوقت */
#timer{
font-size:22px;
margin-top:10px;
color:#ff0000;
}
</style>
</head>

<body>

<div id="startScreen">
<h1>🚀 Planet Heroes 🌍</h1>
<p>أنقذ الكوكب بحل الأسئلة!</p>
<button onclick="startGame()">ابدأ اللعبة</button>
</div>

<div id="planetContainer">
<div id="planet"></div>
<img id="ship" src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
</div>

<div id="gameUI">
<div id="question"></div>
<div id="timer"></div>
<div id="options"></div>
<div id="info">النقاط: 0 | الطاقة: 3 | المستوى: 1</div>
</div>

<script>
let score=0;
let energy=3;
let level=1;
let timeLeft=10;
let timerInterval;

const ship=document.getElementById("ship");
ship.style.left="50%";
ship.style.top="40%";

function startGame(){
document.getElementById("startScreen").style.display="none";
newQuestion();
startTimer();
}

function startTimer(){
timeLeft=10;
document.getElementById("timer").innerText="الوقت: "+timeLeft;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="الوقت: "+timeLeft;
if(timeLeft<=0){
energy--;
updateUI();
newQuestion();
timeLeft=10;
}
},1000);
}

function newQuestion(){
let angle=[0,30,45,60,90][Math.floor(Math.random()*5)];
let correct=Math.sin(angle*Math.PI/180).toFixed(2);

let options=[correct];
while(options.length<4){
let fake=(Math.random()).toFixed(2);
if(!options.includes(fake)) options.push(fake);
}
options.sort(()=>Math.random()-0.5);

document.getElementById("question").innerText=
"ما قيمة sin("+angle+"°) ؟";

document.getElementById("options").innerHTML=
options.map(o=>`<button class="option" onclick="check('${o}','${correct}')">${o}</button>`).join("");
}

function check(sel,correct){
if(sel===correct){
score++;
explode();
moveShip();
}else{
energy--;
}
updateUI();
if(energy<=0){
alert("انتهت اللعبة 😢");
location.reload();
}
if(score>=15){
alert("فزت! 🎉");
location.reload();
}
newQuestion();
}

function updateUI(){
level=Math.floor(score/5)+1;
document.getElementById("info").innerText=
`النقاط: ${score} | الطاقة: ${energy} | المستوى: ${level}`;
}

function explode(){
let e=document.createElement("div");
e.className="explosion";
e.innerText="💥";
e.style.left=ship.style.left;
e.style.top=ship.style.top;
document.body.appendChild(e);
setTimeout(()=>e.remove(),800);
}

function moveShip(){
ship.style.left=Math.random()*60+20+"%";
ship.style.top=Math.random()*40+20+"%";
}
</script>

</body>
</html>
