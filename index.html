<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 لعبة أبطال المثلثات 🔥</title>

<style>

/* خلفية متحركة رهيبة */
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    text-align: center;
    color: white;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h1 {
    margin-top: 20px;
    font-size: 40px;
    text-shadow: 0 0 20px #00ffff;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ffff; }
    to { text-shadow: 0 0 30px #00ffff; }
}

.game-box {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    margin: 40px auto;
    width: 350px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    transition: 0.3s;
    background: #00ffff;
    color: black;
    font-weight: bold;
}

button:hover {
    transform: scale(1.1);
    background: #ff00ff;
    color: white;
}

.score {
    font-size: 22px;
    margin-top: 15px;
}

.result {
    font-size: 24px;
    margin-top: 15px;
    font-weight: bold;
}

</style>
</head>

<body>

<h1>🎮 أبطال sin - cos - tan 🎮</h1>

<div class="game-box">
    <h2 id="question">...</h2>
    <div id="answers"></div>
    <div class="result" id="result"></div>
    <div class="score">النقاط: <span id="score">0</span></div>
</div>

<script>

let score = 0;

function newQuestion() {

    const angles = [0, 30, 45, 60, 90];
    const functions = ["sin", "cos", "tan"];

    const angle = angles[Math.floor(Math.random() * angles.length)];
    const func = functions[Math.floor(Math.random() * functions.length)];

    document.getElementById("question").innerHTML =
        `احسب ${func}(${angle}°)`;

    let correct;

    const rad = angle * Math.PI / 180;

    if (func === "sin") correct = Math.sin(rad);
    if (func === "cos") correct = Math.cos(rad);
    if (func === "tan") correct = Math.tan(rad);

    correct = parseFloat(correct.toFixed(2));

    let options = [correct];

    while (options.length < 4) {
        let fake = parseFloat((Math.random()*2 - 1).toFixed(2));
        if (!options.includes(fake)) options.push(fake);
    }

    options.sort(() => Math.random() - 0.5);

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.onclick = function() {
            if (option === correct) {
                document.getElementById("result").innerText = "🔥 صحيح!";
                score++;
            } else {
                document.getElementById("result").innerText = "❌ خطأ!";
            }
            document.getElementById("score").innerText = score;
            setTimeout(newQuestion, 1000);
        };
        answersDiv.appendChild(btn);
    });
}

newQuestion();

</script>

</body>
</html>
