<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 عجلة أبطال المثلثات</title>

<style>

body{
    margin:0;
    background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
    font-family: Arial;
    text-align:center;
    color:white;
    overflow:hidden;
}

h1{
    margin-top:20px;
    font-size:35px;
    text-shadow:0 0 20px cyan;
}

.wheel-container{
    position:relative;
    width:350px;
    height:350px;
    margin:30px auto;
}

.wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:10px solid white;
    transition: transform 4s ease-out;
    background: conic-gradient(
        #ff7675 0% 10%,
        #74b9ff 10% 20%,
        #55efc4 20% 30%,
        #ffeaa7 30% 40%,
        #a29bfe 40% 50%,
        #fab1a0 50% 60%,
        #81ecec 60% 70%,
        #fd79a8 70% 80%,
        #00cec9 80% 90%,
        #e17055 90% 100%
    );
}

.pointer{
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    font-size:40px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    background:cyan;
    cursor:pointer;
    margin-top:15px;
    font-weight:bold;
}

button:hover{
    background:magenta;
    color:white;
}

#question-box{
    margin-top:20px;
}

.answer-btn{
    display:block;
    margin:10px auto;
    padding:10px;
    width:200px;
}

.score{
    margin-top:15px;
    font-size:20px;
}

</style>
</head>
<body>

<h1>🎡 عجلة أبطال sin cos tan 🎡</h1>

<div class="wheel-container">
    <div class="pointer">▼</div>
    <div class="wheel" id="wheel"></div>
</div>

<button onclick="spinWheel()">لف العجلة</button>

<div id="question-box"></div>
<div class="score">النقاط: <span id="score">0</span></div>

<script>

let score = 0;
let currentRotation = 0;

const questions = [
{q:"sin(30°)",a:"0.5"},
{q:"cos(60°)",a:"0.5"},
{q:"tan(45°)",a:"1"},
{q:"sin(90°)",a:"1"},
{q:"cos(0°)",a:"1"},
{q:"tan(0°)",a:"0"},
{q:"sin(45°)",a:"0.71"},
{q:"cos(45°)",a:"0.71"},
{q:"tan(30°)",a:"0.58"},
{q:"tan(60°)",a:"1.73"}
];

function spinWheel(){

    const randomIndex = Math.floor(Math.random()*10);
    const degreesPerSection = 360/10;
    const spinDegrees = 360*5 + (randomIndex*degreesPerSection);

    currentRotation += spinDegrees;
    document.getElementById("wheel").style.transform =
        "rotate(" + currentRotation + "deg)";

    setTimeout(()=>{
        showQuestion(randomIndex);
    },4000);
}

function showQuestion(index){

    const box = document.getElementById("question-box");
    box.innerHTML = "";

    const q = document.createElement("h2");
    q.innerText = "احسب " + questions[index].q;
    box.appendChild(q);

    let options = [questions[index].a];

    while(options.length<4){
        let fake = (Math.random()*2).toFixed(2);
        if(!options.includes(fake)) options.push(fake);
    }

    options.sort(()=>Math.random()-0.5);

    options.forEach(option=>{
        const btn = document.createElement("button");
        btn.className="answer-btn";
        btn.innerText = option;
        btn.onclick=function(){
            if(option===questions[index].a){
                alert("🔥 صحيح!");
                score++;
            }else{
                alert("❌ خطأ!");
            }
            document.getElementById("score").innerText=score;
        };
        box.appendChild(btn);
    });
}

</script>

</body>
</html>
